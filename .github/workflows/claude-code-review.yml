# Automatic Claude review on every pull request.
# Requires a repo secret: ANTHROPIC_API_KEY  (gh secret set ANTHROPIC_API_KEY)
# Verify the latest action version at https://github.com/anthropics/claude-code-action
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for bugs, security issues (especially SQL
            injection and auth/credential leaks), missing tests, and code quality.
            Follow the conventions in the repo's .claude/skills. Leave concise
            inline comments and a short summary. Be specific with file:line.
