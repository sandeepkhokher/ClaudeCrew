# Automatic Claude review on every pull request.
# Requires a repo secret: ANTHROPIC_API_KEY  (gh secret set ANTHROPIC_API_KEY)
# Verify the latest action version at https://github.com/anthropics/claude-code-action
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # track_progress makes the action create a sticky tracking comment and
          # publish a proper PR review (summary + inline comments). Without it,
          # a bare prompt runs but often posts nothing ("No buffered inline comments").
          track_progress: true
          prompt: |
            Review this pull request for bugs, security issues (especially SQL
            injection and auth/credential leaks), missing tests, and code quality.
            Follow the conventions in the repo's .claude/skills.
            Post a brief overall summary as a PR comment, and leave inline comments
            on specific lines where you find issues. Be specific with file:line.
